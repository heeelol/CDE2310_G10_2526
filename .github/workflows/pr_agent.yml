name: Qodo Merge AI Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Run PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supply the key natively and via the Qodo prefix
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Force lowercase double-underscores for the model parameters
          config__model: "gemini/gemini-2.5-flash"
          config__fallback_models: '["gemini/gemini-2.5-flash"]'
          # Turn on maximum logging
          config__log_level: "DEBUG"
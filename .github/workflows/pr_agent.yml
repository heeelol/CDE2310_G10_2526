name: Qodo Merge AI Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Run PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The mandatory Qodo prefix for Gemini keys:
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Bulletproof double-underscore formatting:
          CONFIG__MODEL: "gemini/gemini-1.5-flash"
          CONFIG__FALLBACK_MODELS: '["gemini/gemini-1.5-flash"]'
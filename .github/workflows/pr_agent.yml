name: Qodo Merge AI Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Verify Secret Exists
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "🚨 FATAL ERROR: GitHub Actions sees an EMPTY secret. The key is missing!"
            exit 1
          else
            echo "✅ SUCCESS: GitHub Actions successfully loaded a secret string!"
          fi
          
      - name: Run PR Agent
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          config__model: "gemini/gemini-2.5-flash"
          config__fallback_models: '["gemini/gemini-2.5-flash"]'
          config__log_level: "DEBUG"